<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Octopus Dashboard: East Anglia</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
    <style>
        :root { --agile: #f03292; --tracker: #4bc0c0; --gas: #ff9f40; --bg: #0d0d12; --card: #1a1a24; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        /* Dashboard Header */
        .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; text-align: center; border-bottom: 4px solid #333; }
        .stat-card.agile { border-color: var(--agile); }
        .stat-card.tracker { border-color: var(--tracker); }
        .stat-card.gas { border-color: var(--gas); }
        .val { font-size: 2rem; font-weight: bold; display: block; }
        .label { font-size: 0.8rem; color: #a0a0b0; text-transform: uppercase; letter-spacing: 1px; }

        /* Chart Area */
        .chart-box { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; position: relative; }
        
        /* Tables */
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
        th { background: #252533; padding: 12px; text-align: left; font-size: 0.9rem; color: #a0a0b0; }
        td { padding: 12px; border-top: 1px solid #333; }
        .cheaper { color: #2ecc71; font-weight: bold; }
        .expensive { color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <div class="dash-grid">
        <div class="stat-card agile">
            <span class="label">Current Agile</span>
            <span class="val" id="curAgile">-</span>
        </div>
        <div class="stat-card tracker">
            <span class="label">Tracker (Elec)</span>
            <span class="val" id="curTracker">-</span>
        </div>
        <div class="stat-card gas">
            <span class="label">Tracker (Gas)</span>
            <span class="val" id="curGas">-</span>
        </div>
    </div>

    <div class="chart-box">
        <canvas id="mainChart"></canvas>
    </div>

    <h3>Cheapest Slots (Next 24h)</h3>
    <table id="savingsTable">
        <thead>
            <tr>
                <th>Time Window</th>
                <th>Agile Price</th>
                <th>vs. Tracker</th>
                <th>Advice</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const REGION = 'A'; // East Anglia
    const API_BASE = "https://api.octopus.energy/v1/products/";
    
    // Product codes updated for March 2026
    const AGILE_E = `${API_BASE}AGILE-24-10-01/electricity-tariffs/E-1R-AGILE-24-10-01-${REGION}/standard-unit-rates/`;
    const TRACKER_E = `${API_BASE}SILVER-24-12-31/electricity-tariffs/E-1R-SILVER-24-12-31-${REGION}/standard-unit-rates/`;
    const TRACKER_G = `${API_BASE}SILVER-24-12-31/gas-tariffs/G-1R-SILVER-24-12-31-${REGION}/standard-unit-rates/`;

    async function init() {
        try {
            const [ae, te, tg] = await Promise.all([
                fetch(AGILE_E).then(r => r.json()),
                fetch(TRACKER_E).then(r => r.json()),
                fetch(TRACKER_G).then(r => r.json())
            ]);

            const agile = ae.results.sort((a,b) => new Date(a.valid_from) - new Date(b.valid_from));
            const trackE = te.results;
            const trackG = tg.results;

            updateDashboard(agile, trackE, trackG);
            renderMainChart(agile, trackE, trackG);
            renderSavings(agile, trackE);
        } catch (e) { console.error("API Error:", e); }
    }

    function updateDashboard(agile, trackE, trackG) {
        const now = new Date();
        const currentAgile = agile.find(d => new Date(d.valid_from) <= now && new Date(d.valid_to) > now);
        const todayStr = now.toISOString().split('T')[0];
        const currentTE = trackE.find(d => d.valid_from.startsWith(todayStr));
        const currentTG = trackG.find(d => d.valid_from.startsWith(todayStr));

        document.getElementById('curAgile').innerText = currentAgile ? currentAgile.value_inc_vat.toFixed(1) + 'p' : '-';
        document.getElementById('curTracker').innerText = currentTE ? currentTE.value_inc_vat.toFixed(1) + 'p' : '-';
        document.getElementById('curGas').innerText = currentTG ? currentTG.value_inc_vat.toFixed(1) + 'p' : '-';
    }

    function renderMainChart(agile, trackE, trackG) {
        const labels = agile.map(d => new Date(d.valid_from).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}));
        const agileData = agile.map(d => d.value_inc_vat);
        
        const trackEData = agile.map(a => {
            const match = trackE.find(t => t.valid_from.startsWith(a.valid_from.split('T')[0]));
            return match ? match.value_inc_vat : null;
        });

        const trackGData = agile.map(a => {
            const match = trackG.find(t => t.valid_from.startsWith(a.valid_from.split('T')[0]));
            return match ? match.value_inc_vat : null;
        });

        new Chart(document.getElementById('mainChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Agile (Elec)', data: agileData, borderColor: '#f03292', tension: 0.3, pointRadius: 0, borderWidth: 2 },
                    { label: 'Tracker (Elec)', data: trackEData, borderColor: '#4bc0c0', stepped: 'before', borderDash: [5,5], pointRadius: 0 },
                    { label: 'Tracker (Gas)', data: trackGData, borderColor: '#ff9f40', stepped: 'before', pointRadius: 0, borderWidth: 1 }
                ]
            },
            options: {
                responsive: true,
                scales: { 
                    y: { grid: { color: '#333' }, ticks: { color: '#aaa' } },
                    x: { ticks: { color: '#aaa', maxTicksLimit: 12 } }
                },
                plugins: {
                    annotation: {
                        annotations: {
                            line1: {
                                type: 'line',
                                xMin: labels[agile.findIndex(d => new Date(d.valid_from) > new Date()) - 1],
                                xMax: labels[agile.findIndex(d => new Date(d.valid_from) > new Date()) - 1],
                                borderColor: 'white',
                                borderWidth: 2,
                                label: { content: 'NOW', display: true, backgroundColor: 'white', color: 'black', font: {size: 10} }
                            }
                        }
                    }
                }
            }
        });
    }

    function renderSavings(agile, trackE) {
        const tbody = document.querySelector('#savingsTable tbody');
        const futureSlots = agile.filter(d => new Date(d.valid_from) > new Date()).slice(0, 10);
        
        futureSlots.forEach(slot => {
            const trackerPrice = trackE.find(t => t.valid_from.startsWith(slot.valid_from.split('T')[0])).value_inc_vat;
            const diff = (slot.value_inc_vat - trackerPrice).toFixed(1);
            const isCheaper = slot.value_inc_vat < trackerPrice;

            const row = `<tr>
                <td>${new Date(slot.valid_from).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</td>
                <td>${slot.value_inc_vat.toFixed(1)}p</td>
                <td class="${isCheaper ? 'cheaper' : 'expensive'}">${isCheaper ? 'SAVE ' + Math.abs(diff) + 'p' : '+' + diff + 'p'}</td>
                <td>${isCheaper ? '⚡ Use Appliances' : 'Wait'}</td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    init();
</script>
</body>
</html>
