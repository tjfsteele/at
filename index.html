<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Octopus Live - Dynamic Intervals</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <style>
        :root { --agile: #f03292; --tracker: #4bc0c0; --gas: #ff9f40; --bg: #0d0d12; --card: #1a1a24; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        .dash { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 15px; }
        @media (min-width: 600px) { .dash { grid-template-columns: repeat(3, 1fr); } }

        .card { background: var(--card); padding: 12px; border-radius: 12px; text-align: center; border-bottom: 4px solid #333; }
        .val { font-size: 1.6rem; font-weight: bold; display: block; margin-top: 5px; }
        .label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }

        .chart-box { background: var(--card); padding: 10px; border-radius: 12px; height: 70vh; min-height: 450px; }
    </style>
</head>
<body>

<div class="container">
    <div class="dash">
        <div class="card" style="border-color: var(--agile)"><span class="label">Agile Elec</span><span class="val" id="ca">-</span></div>
        <div class="card" style="border-color: var(--tracker)"><span class="label">Tracker Elec</span><span class="val" id="ce">-</span></div>
        <div class="card" style="border-color: var(--gas)"><span class="label">Tracker Gas</span><span class="val" id="cg">-</span></div>
    </div>

    <div class="chart-box">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<script>
    Chart.register(window['chartjs-plugin-annotation']);
    const REG = 'A'; 
    const fetchJSON = url => fetch(url).then(r => r.json());

    async function run() {
        // Fetch data for all tariffs
        const [aData, eData, gData] = await Promise.all([
            fetchJSON(`https://api.octopus.energy/v1/products/AGILE-24-10-01/electricity-tariffs/E-1R-AGILE-24-10-01-${REG}/standard-unit-rates/`),
            fetchJSON(`https://api.octopus.energy/v1/products/SILVER-24-12-31/electricity-tariffs/E-1R-SILVER-24-12-31-${REG}/standard-unit-rates/`),
            fetchJSON(`https://api.octopus.energy/v1/products/SILVER-24-12-31/gas-tariffs/G-1R-SILVER-24-12-31-${REG}/standard-unit-rates/`)
        ]);

        const agile = aData.results.sort((a,b) => new Date(a.valid_from) - new Date(b.valid_from));
        const now = new Date();
        const todayStr = now.toISOString().split('T')[0];

        // RESPONSIVE LOGIC: Only show "Today" if the screen is narrow (mobile)
        const isMobile = window.innerWidth < 768;
        const filteredAgile = isMobile 
            ? agile.filter(d => d.valid_from.startsWith(todayStr)) 
            : agile;

        // GENERATE LABELS
        const labels = filteredAgile.map(d => {
            const dt = new Date(d.valid_from);
            // 3H Interval logic: Only label top of hour if divisible by 3
            if (dt.getMinutes() === 0 && dt.getHours() % 3 === 0) {
                return dt.toLocaleDateString([], {day:'2-digit', month:'short'}) + ' ' + 
                       dt.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            }
            return ''; 
        });
        
        const nowIdx = filteredAgile.findIndex(d => new Date(d.valid_from) > now) - 1;

        // SET DASHBOARD VALUES
        const curA = agile.find(s => new Date(s.valid_from) <= now && new Date(s.valid_to) > now);
        const curE = eData.results.find(s => s.valid_from.startsWith(todayStr));
        const curG = gData.results.find(s => s.valid_from.startsWith(todayStr));
        
        document.getElementById('ca').innerText = curA ? curA.value_inc_vat.toFixed(1)+'p' : '-';
        document.getElementById('ce').innerText = curE ? curE.value_inc_vat.toFixed(1)+'p' : '-';
