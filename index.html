<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Octopus Live: East Anglia</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <style>
        :root { --agile: #f03292; --tracker: #4bc0c0; --gas: #ff9f40; --bg: #0d0d12; --card: #1a1a24; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .dash { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; text-align: center; border-bottom: 3px solid #333; }
        .val { font-size: 1.8rem; font-weight: bold; display: block; }
        .label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; }
        .chart-container { background: var(--card); padding: 15px; border-radius: 10px; height: 500px; position: relative; }
    </style>
</head>
<body>

<div class="container">
    <div class="dash">
        <div class="card" style="border-color: var(--agile)"><span class="label">Current Agile</span><span class="val" id="ca">-</span></div>
        <div class="card" style="border-color: var(--tracker)"><span class="label">Tracker Elec</span><span class="val" id="ce">-</span></div>
        <div class="card" style="border-color: var(--gas)"><span class="label">Tracker Gas</span><span class="val" id="cg">-</span></div>
    </div>

    <div class="chart-container">
        <canvas id="canvas"></canvas>
    </div>
</div>

<script>
    Chart.register(window['chartjs-plugin-annotation']);

    const REG = 'A'; 
    const fetchJSON = url => fetch(url).then(r => r.json());

    async function run() {
        const [aData, eData, gData] = await Promise.all([
            fetchJSON(`https://api.octopus.energy/v1/products/AGILE-24-10-01/electricity-tariffs/E-1R-AGILE-24-10-01-${REG}/standard-unit-rates/`),
            fetchJSON(`https://api.octopus.energy/v1/products/SILVER-24-12-31/electricity-tariffs/E-1R-SILVER-24-12-31-${REG}/standard-unit-rates/`),
            fetchJSON(`https://api.octopus.energy/v1/products/SILVER-24-12-31/gas-tariffs/G-1R-SILVER-24-12-31-${REG}/standard-unit-rates/`)
        ]);

        const agile = aData.results.sort((a,b) => new Date(a.valid_from) - new Date(b.valid_from));
        const now = new Date();

        const curA = agile.find(s => new Date(s.valid_from) <= now && new Date(s.valid_to) > now);
        const todayStr = now.toISOString().split('T')[0];
        const curE = eData.results.find(s => s.valid_from.startsWith(todayStr));
        const curG = gData.results.find(s => s.valid_from.startsWith(todayStr));

        document.getElementById('ca').innerText = curA ? curA.value_inc_vat.toFixed(1)+'p' : '-';
        document.getElementById('ce').innerText = curE ? curE.value_inc_vat.toFixed(1)+'p' : '-';
        document.getElementById('cg').innerText = curG ? curG.value_inc_vat.toFixed(1)+'p' : '-';

        const labels = agile.map(d => new Date(d.valid_from).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}));
        const nowIdx = agile.findIndex(d => new Date(d.valid_from) > now) - 1;

        new Chart(document.getElementById('canvas'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Agile (Elec)', data: agile.map(d => d.value_inc_vat), borderColor: '#f03292', yAxisID: 'y', tension: 0.3, pointRadius: 0 },
                    { 
                        label: 'Tracker (Elec)', 
                        data: agile.map(a => (eData.results.find(t => t.valid_from.startsWith(a.valid_from.split('T')[0])) || {}).value_inc_vat),
                        borderColor: '#4bc0c0', yAxisID: 'y', stepped: 'before', borderDash: [5,5], pointRadius: 0 
                    },
                    { 
                        label: 'Tracker (Gas)', 
                        data: agile.map(a => (gData.results.find(t => t.valid_from.startsWith(a.valid_from.split('T')[0])) || {}).value_inc_vat),
                        borderColor: '#ff9f40', yAxisID: 'yGas', stepped: 'before', pointRadius: 0, borderWidth: 2 
                    }
                ]
            },
            options: {
                maintainAspectRatio: false,
                plugins: {
                    annotation: {
                        annotations: {
                            nowLine: {
                                type: 'line', xMin: nowIdx, xMax: nowIdx,
                                borderColor: 'white', borderWidth: 2,
                                label: { content: 'NOW', display: true, backgroundColor: 'white', color: 'black' }
                            }
                        }
                    }
                },
                scales: { 
                    y: { 
                        type: 'linear', display: true, position: 'left',
                        title: { display: true, text: 'Electricity (p/kWh)', color: '#4bc0c0' },
                        grid: { color: '#333' }, ticks: { color: '#aaa' }
                    },
                    yGas: { 
                        type: 'linear', display: true, position: 'right',
                        title: { display: true, text: 'Gas (p/kWh)', color: '#ff9f40' },
                        grid: { drawOnChartArea: false }, // Only show grid for left axis
                        ticks: { color: '#ff9f40' }
                    },
                    x: { ticks: { color: '#aaa', maxTicksLimit: 12 } }
                }
            }
        });
    }
    run();
</script>
</body>
</html>
