<!DOCTYPE html>

        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Mobile-First Dashboard: Stacks on small screens */
        .dash { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 15px; }
        @media (min-width: 600px) { .dash { grid-template-columns: repeat(3, 1fr); } }

        .card { background: var(--card); padding: 12px; border-radius: 12px; text-align: center; border-bottom: 4px solid #333; }
        .val { font-size: 1.6rem; font-weight: bold; display: block; margin-top: 5px; }
        .label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Chart container with dynamic height for mobile */
        .chart-box { background: var(--card); padding: 10px; border-radius: 12px; height: 60vh; min-height: 400px; }
    </style>
</head>
