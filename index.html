<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Octopus Live - Auto Roll</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <style>
        :root { --agile: #f03292; --tracker: #4bc0c0; --gas: #ff9f40; --bg: #0d0d12; --card: #1a1a24; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 8px; overflow-x: hidden; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        .dash { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 6px; 
            margin-bottom: 10px; 
        }

        .card { 
            background: var(--card); 
            padding: 8px 4px; 
            border-radius: 8px; 
            text-align: center; 
            border-bottom: 3px solid #333; 
        }

        .val { font-size: 1.1rem; font-weight: bold; display: block; }
        .label { font-size: 0.6rem; color: #aaa; text-transform: uppercase; white-space: nowrap; }

        @media (min-width: 768px) {
            .dash { gap: 15px; margin-bottom: 15px; }
            .card { padding: 15px; border-bottom-width: 4px; }
            .val { font-size: 1.8rem; }
            .label { font-size: 0.75rem; }
        }

        .chart-box { 
            background: var(--card); 
            padding: 8px; 
            border-radius: 12px; 
            height: 72vh; 
            min-height: 400px; 
            position: relative;
        }

        #updated-tag {
            text-align: right;
            font-size: 0.6rem;
            color: #555;
            margin-top: 5px;
            padding-right: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="dash">
        <div class="card" style="border-color: var(--agile)"><span class="label">Agile</span><span class="val" id="ca">-</span></div>
        <div class="card" style="border-color: var(--tracker)"><span class="label">Trk Elec</span><span class="val" id="ce">-</span></div>
        <div class="card" style="border-color: var(--gas)"><span class="label">Trk Gas</span><span class="val" id="cg">-</span></div>
    </div>

    <div class="chart-box">
        <canvas id="mainChart"></canvas>
    </div>
    <div id="updated-tag">Syncing...</div>
</div>

<script>
    Chart.register(window['chartjs-plugin-annotation']);
    const REG = 'A'; 
    const fetchJSON = url => fetch(url).then(r => r.json());
    let myChart = null;

    async function updateDashboard() {
        try {
            const [aData, eData, gData] = await Promise.all([
                fetchJSON(`https://api.octopus.energy/v1/products/AGILE-24-10-01/electricity-tariffs/E-1R-AGILE-24-10-01-${REG}/standard-unit-rates/`),
                fetchJSON(`https://api.octopus.energy/v1/products/SILVER-24-12-31/electricity-tariffs/E-1R-SILVER-24-12-31-${REG}/standard-unit-rates/`),
                fetchJSON(`https://api.octopus.energy/v1/products/SILVER-24-12-31/gas-tariffs/G-1R-SILVER-24-12-31-${REG}/standard-unit-rates/`)
            ]);

            const agileFull = aData.results.sort((a,b) => new Date(a.valid_from) - new Date(b.valid_from));
            const now = new Date();
            
            // Get start of today in local time for filtering
            const today = new Date();
            today.setHours(0,0,0,0);
            
            const isMobile = window.innerWidth < 768;
            
            // FILTER: Remove yesterday, keep today and tomorrow
            const modernData = agileFull.filter(d => new Date(d.valid_from) >= today);

            // MOBILE: Filter to today only
            const filteredAgile = isMobile 
                ? modernData.filter(d => {
                    const dDate = new Date(d.valid_from);
                    return dDate.getDate() === today.getDate();
                }) 
                : modernData;

            const labels = filteredAgile.map(d => {
                const dt = new Date(d.valid_from);
                const hrs = dt.getHours();
                const mins = dt.getMinutes();
                if (hrs === 0 && mins === 0) return dt.toLocaleDateString([], {day:'2-digit', month:'short'});
                if (mins === 0 && hrs % 3 === 0) return hrs.toString().padStart(2, '0') + ':00';
                return ''; 
            });
            
            // Find current position of NOW bar
            const nowIdx = filteredAgile.findIndex(d => new Date(d.valid_from) > now) - 1;

            // Update Price Cards
            const curA = agileFull.find(s => new Date(s.valid_from) <= now && new Date(s.valid_to) > now);
            const curE = eData.results.find(s => {
                const dDate = new Date(s.valid_from);
                return dDate.getDate() === today.getDate();
            });
            const curG = gData.results.find(s => {
                const dDate = new Date(s.valid_from);
                return dDate.getDate() === today.getDate();
            });
            
            document.getElementById('ca').innerText = curA ? curA.value_inc_vat.toFixed(1)+'p' : '-';
            document.getElementById('ce').innerText = curE ? curE.value_inc_vat.toFixed(1)+'p' : '-';
            document.getElementById('cg').innerText = curG ? curG.value_inc_vat.toFixed(1)+'p' : '-';
            document.getElementById('updated-tag').innerText = "Last Updated: " + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            if (myChart) myChart.destroy();

            myChart = new Chart(document.getElementById('mainChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { 
                            label: 'Agile', 
                            data: filteredAgile.map(d => d.value_inc_vat), 
                            borderColor: '#f03292', 
                            stepped: 'after', 
                            pointRadius: 0, 
                            borderWidth: 2 
                        },
                        { 
                            label: 'Elec Trk', 
                            data: filteredAgile.map(a => {
                                const aDate = new Date(a.valid_from).getDate();
                                const trk = eData.results.find(t => new Date(t.valid_from).getDate() === aDate);
                                return trk ? trk.value_inc_vat : null;
                            }),
                            borderColor: '#4bc0c0', 
                            stepped: 'before', 
                            pointRadius: 0, 
                            borderWidth: 1.5 
                        },
                        { 
                            label: 'Gas Trk', 
                            data: filteredAgile.map(a => {
                                const aDate = new Date(a.valid_from).getDate();
                                const trk = gData.results.find(t => new Date(t.valid_from).getDate() === aDate);
                                return trk ? trk.value_inc_vat : null;
                            }),
                            borderColor: '#ff9f40', 
                            yAxisID: 'yGas', 
                            stepped: 'before', 
                            pointRadius: 0, 
                            borderWidth: 2 
                        }
                    ]
                },
                options: {
                    maintainAspectRatio: false,
                    animation: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 }, color: '#aaa' } },
                        annotation: {
                            annotations: {
                                nowLine: { 
                                    type: 'line', 
                                    xMin: nowIdx, xMax: nowIdx, 
                                    borderColor: 'rgba(255, 255, 255, 0.4)', 
                                    borderWidth: 2, 
                                    display: nowIdx >= 0,
                                    label: { content: 'NOW', display: true, position: 'start', backgroundColor: 'rgba(0,0,0,0.5)', font: { size: 9 } } 
                                }
                            }
                        }
                    },
                    scales: { 
                        y: { position: 'left', beginAtZero: true, ticks: { color: '#aaa', font: { size: 10 } }, grid: { color: '#222' } },
                        yGas: { position: 'right', beginAtZero: true, min: 0, ticks: { color: '#ff9f40', font: { size: 10 } }, grid: { drawOnChartArea: false } },
                        x: { 
                            grid: { color: (ctx) => (ctx.tick && ctx.tick.label !== '') ? '#333' : 'transparent' },
                            ticks: { 
                                color: (ctx) => (ctx.tick.label && ctx.tick.label.includes(':')) ? '#aaa' : '#fff', 
                                autoSkip: false, 
                                maxRotation: 0, 
                                font: (ctx) => {
                                    const isDate = ctx.tick.label && !ctx.tick.label.includes(':');
                                    return { size: 9, weight: isDate ? 'bold' : 'normal' };
                                }
                            } 
                        }
                    }
                }
            });
        } catch (e) {
            console.error("Update failed", e);
            document.getElementById('updated-tag').innerText = "Update Failed - Retrying...";
        }
    }

    updateDashboard();
    // 30 min refresh
    setInterval(updateDashboard, 1800000);
</script>
</body>
</html>
