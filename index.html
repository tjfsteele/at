<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Octopus Live: East Anglia (Region A)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #0d0d12; color: #ffffff; padding: 20px; line-height: 1.6; }
        .container { max-width: 1000px; margin: 0 auto; background: #1a1a24; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #f03292; margin-top: 0; }
        .status-bar { text-align: center; font-size: 0.9rem; color: #a0a0b0; margin-bottom: 20px; }
        #loading { text-align: center; padding: 100px 0; font-size: 1.2rem; color: #f03292; }
        .legend-custom { display: flex; justify-content: center; gap: 20px; margin-top: 20px; font-size: 0.9rem; }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Agile vs Tracker: East Anglia</h1>
    <div class="status-bar" id="statusBar">Connecting to Octopus API...</div>
    
    <div id="loading">Gathering half-hourly rates...</div>
    <canvas id="priceChart" style="display:none;"></canvas>

    <div class="legend-custom">
        <span><span class="dot" style="background-color: #f03292;"></span>Agile (30m)</span>
        <span><span class="dot" style="background-color: #4bc0c0;"></span>Tracker (Daily)</span>
    </div>
</div>

<script>
    // REGION A = Eastern England / East Anglia
    const REGION = 'A'; 
    const AGILE_URL = `https://api.octopus.energy/v1/products/AGILE-24-10-01/electricity-tariffs/E-1R-AGILE-24-10-01-${REGION}/standard-unit-rates/`;
    const TRACKER_URL = `https://api.octopus.energy/v1/products/SILVER-24-12-31/electricity-tariffs/E-1R-SILVER-24-12-31-${REGION}/standard-unit-rates/`;

    async function fetchData() {
        try {
            const [agileRes, trackerRes] = await Promise.all([
                fetch(AGILE_URL),
                fetch(TRACKER_URL)
            ]);

            const agileData = await agileRes.json();
            const trackerData = await trackerRes.json();

            if (!agileData.results || !trackerData.results) throw new Error("Data missing");

            document.getElementById('loading').style.display = 'none';
            document.getElementById('priceChart').style.display = 'block';
            document.getElementById('statusBar').innerText = `Live Data for ${new Date().toLocaleDateString('en-GB')}`;

            renderChart(agileData.results, trackerData.results);
        } catch (err) {
            document.getElementById('loading').innerText = "Failed to load Octopus data. Please try again later.";
            console.error(err);
        }
    }

    function renderChart(agile, tracker) {
        // Sort Agile data (newest is usually first in API)
        const sortedAgile = agile.sort((a, b) => new Date(a.valid_from) - new Date(b.valid_from));
        
        const labels = sortedAgile.map(d => {
            const date = new Date(d.valid_from);
            return date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        });

        const agileValues = sortedAgile.map(d => d.value_inc_vat);
        
        const trackerValues = sortedAgile.map(a => {
            const aDate = a.valid_from.split('T')[0];
            const match = tracker.find(t => t.valid_from.split('T')[0] === aDate);
            return match ? match.value_inc_vat : null;
        });

        new Chart(document.getElementById('priceChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Agile p/kWh',
                    data: agileValues,
                    borderColor: '#f03292',
                    backgroundColor: 'rgba(240, 50, 146, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 0,
                    borderWidth: 2
                }, {
                    label: 'Tracker p/kWh',
                    data: trackerValues,
                    borderColor: '#4bc0c0',
                    borderDash: [5, 5],
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    y: { 
                        beginAtZero: true,
                        grid: { color: '#333' },
                        ticks: { color: '#aaa' },
                        title: { display: true, text: 'Pence per kWh', color: '#fff' }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#aaa', maxTicksLimit: 12 }
                    }
                },
                plugins: {
                    legend: { display: false } // Using custom HTML legend
                }
            }
        });
    }

    fetchData();
</script>
</body>
</html>
